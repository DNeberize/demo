spring.application.name=worde
spring.datasource.url=jdbc:h2:file:./data/worde-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.freemarker.suffix=.ftl
spring.freemarker.cache=false
spring.profiles.default=dev
logging.level.com.github.DNeberize.demo=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
logging.file.name=logs/worde.log
app.ui.hero-title=Guess the five-letter word.
app.ui.hero-copy=Six tries. Letters only. Scores and stats are saved.
